<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Premier Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      text-align: center;

      background: url("fondo.jpg") no-repeat center center fixed;
      background-size: cover;
    }

    .overlay {
      background: rgba(0,0,0,0.75);
      min-height: 100vh;
      padding: 20px;
    }

    /* 🔥 LOGO */
    .logo {
      width: 320px;
      animation: glow 2s infinite alternate;
      filter: drop-shadow(0 0 10px #38bdf8);
    }

    @keyframes glow {
      0% {
        filter: drop-shadow(0 0 8px #38bdf8) drop-shadow(0 0 18px #38bdf8);
      }
      100% {
        filter: drop-shadow(0 0 30px #38bdf8) drop-shadow(0 0 60px #38bdf8);
      }
    }

    header {
      padding-top: 20px;
    }

    /* 🖼️ PREMIER (CORREGIDO Y PERFECTAMENTE CENTRADO) */
    .premier {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 20px;
    }

    .premier img {
      width: 850px;
      max-width: 95%;
      display: block;
      margin: 0 auto;
    }

    /* 🎮 JUEGO */
    .game {
      margin-top: 30px;
    }

    .game h3 {
      margin-bottom: 10px;
    }

    .game img {
      width: 300px;
      border-radius: 15px;
    }

    /* 🌐 REDES */
    .redes {
      margin-top: 30px;
    }

    .redes a {
      margin: 10px;
      font-size: 26px;
      color: white;
      background: #1e293b;
      padding: 12px;
      border-radius: 50%;
      transition: 0.3s;
      display: inline-block;
    }

    .redes a:hover {
      background: #38bdf8;
      transform: scale(1.2);
    }

  </style>
</head>

<body>

<div class="overlay">

  <!-- 🔥 LOGO -->
  <header>
    <img src="logo.png" class="logo" alt="Logo">
  </header>

  <!-- 🖼️ PREMIER (AHORA CENTRADO REALMENTE) -->
  <div class="premier">
    <img src="premier.png" alt="Premier">
  </div>

  <!-- 🎮 JUEGO -->
  <div class="game">
    <h3>Nombre del Juego</h3>
    <img src="juego.jpg" alt="Juego">
  </div>

  <!-- 🌐 REDES -->
  <div class="redes">
    <a href="https://wa.me/591XXXXXXXX" target="_blank"><i class="fab fa-whatsapp"></i></a>
    <a href="https://facebook.com/TU_PAGINA" target="_blank"><i class="fab fa-facebook"></i></a>
    <a href="https://tiktok.com/@TU_USUARIO" target="_blank"><i class="fab fa-tiktok"></i></a>
  </div>

</div>

</body>
</html>
