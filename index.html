<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Premier Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      text-align: center;
      background: url("fondo.jpg") no-repeat center center fixed;
      background-size: cover;
    }

    .overlay {
      background: rgba(0,0,0,0.75);
      min-height: 100vh;
      padding: 20px;
    }

    /* 🔥 LOGO */
    .logo {
      width: 380px;
      animation: glow 2s infinite alternate;
      filter: drop-shadow(0 0 15px #38bdf8);
    }

    @keyframes glow {
      0% {
        filter: drop-shadow(0 0 10px #38bdf8) drop-shadow(0 0 25px #38bdf8);
      }
      100% {
        filter: drop-shadow(0 0 40px #38bdf8) drop-shadow(0 0 80px #38bdf8);
      }
    }

    header {
      padding-top: 20px;
    }

    /* 🖼️ PNAME (ANTES PREMIER) */
    .pname {
      margin-top: 20px;
    }

    .pname img {
      width: 1100px;
      max-width: 95%;
      display: block;
      margin: 0 auto;
    }

    /* ✨ TEXTO DORADO/PLATEADO */
    .subtitle {
      margin-top: 10px;
      font-size: 22px;
      font-weight: 600;
      background: linear-gradient(90deg, #d4af37, #c0c0c0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }

    /* 🎮 IMAGEN DEL JUEGO */
    .game {
      margin-top: 30px;
    }

    .game img {
      width: 280px;
      border-radius: 15px;
    }

    /* 🌐 REDES */
    .redes {
      margin-top: 30px;
    }

    .redes a {
      margin: 10px;
      font-size: 26px;
      color: white;
      background: #1e293b;
      padding: 12px;
      border-radius: 50%;
      transition: 0.3s;
      display: inline-block;
    }

    .redes a:hover {
      background: #38bdf8;
      transform: scale(1.2);
    }

    /* 📱 VERSION CELULAR */
    @media (max-width: 768px) {

      .logo {
        width: 220px;
      }

      .pname img {
        width: 95%;
      }

      .subtitle {
        font-size: 16px;
      }

      .game img {
        width: 200px;
      }

      .redes a {
        font-size: 22px;
        padding: 10px;
      }
    }

  </style>
</head>

<body>

<div class="overlay">

  <!-- 🔥 LOGO -->
  <header>
    <img src="logo.png" class="logo" alt="Logo">
  </header>

  <!-- 🖼️ PNAME -->
  <div class="pname">
    <img src="pname.png" alt="Nombre">
  </div>

  <!-- ✨ TEXTO -->
  <div class="subtitle">
    Recargas de monedas móvil, consola y PC
  </div>

  <!-- 🎮 IMAGEN DEL JUEGO -->
  <div class="game">
    <img src="game.png" alt="Juego">
  </div>

  <!-- 🌐 REDES -->
  <div class="redes">
    <a href="https://wa.me/591XXXXXXXX" target="_blank"><i class="fab fa-whatsapp"></i></a>
    <a href="https://facebook.com/TU_PAGINA" target="_blank"><i class="fab fa-facebook"></i></a>
    <a href="https://tiktok.com/@TU_USUARIO" target="_blank"><i class="fab fa-tiktok"></i></a>
  </div>

</div>

</body>
</html>
