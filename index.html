<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Recarga de Monedas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ICONOS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: white;
      text-align: center;
    }

    header {
      padding: 40px 20px;
      animation: fadeDown 1s ease;
    }

    header img {
      width: 90px;
    }

    h1 {
      margin: 10px 0;
      font-size: 2em;
    }

    .game {
      margin: 20px;
      padding: 20px;
      background: #1e293b;
      border-radius: 15px;
      display: inline-block;
      animation: fadeUp 1s ease;
    }

    .game img {
      width: 200px;
      border-radius: 10px;
    }

    .redes {
      margin: 20px;
    }

    .redes a {
      margin: 10px;
      font-size: 22px;
      color: white;
      background: #1e293b;
      padding: 12px;
      border-radius: 50%;
      transition: 0.3s;
      display: inline-block;
    }

    .redes a:hover {
      background: #38bdf8;
      transform: scale(1.2);
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin: 30px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      width: 200px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
      background: #334155;
    }

    .card h3 {
      margin: 10px 0;
    }

    .precio {
      font-size: 1.5em;
      color: #38bdf8;
    }

    .btn {
      margin-top: 10px;
      display: inline-block;
      padding: 10px 15px;
      background: #22c55e;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #16a34a;
    }

    /* BOTON WHATSAPP */
    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25d366;
      color: white;
      font-size: 25px;
      padding: 15px;
      border-radius: 50%;
      text-decoration: none;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      animation: float 2s infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    @keyframes fadeDown {
      from {opacity: 0; transform: translateY(-20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    @keyframes fadeUp {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <img src="logo.png" alt="Logo">
    <h1>Recarga de Monedas</h1>
    <p>Rápido • Seguro • Confiable</p>
  </header>

  <!-- JUEGO -->
  <div class="game">
    <h2>Nombre del Juego</h2>
    <img src="juego.jpg" alt="Juego">
  </div>

  <!-- REDES -->
  <div class="redes">
    <a href="https://wa.me/591XXXXXXXX" target="_blank"><i class="fab fa-whatsapp"></i></a>
    <a href="https://facebook.com/TU_PAGINA" target="_blank"><i class="fab fa-facebook"></i></a>
    <a href="https://tiktok.com/@TU_USUARIO" target="_blank"><i class="fab fa-tiktok"></i></a>
  </div>

  <!-- PRECIOS -->
  <h2>Paquetes</h2>

  <div class="cards">
    <div class="card">
      <h3>100 Monedas</h3>
      <div class="precio">10 Bs</div>
      <a class="btn" href="https://wa.me/591XXXXXXXX" target="_blank">Comprar</a>
    </div>

    <div class="card">
      <h3>500 Monedas</h3>
      <div class="precio">45 Bs</div>
      <a class="btn" href="https://wa.me/591XXXXXXXX" target="_blank">Comprar</a>
    </div>

    <div class="card">
      <h3>1000 Monedas</h3>
      <div class="precio">80 Bs</div>
      <a class="btn" href="https://wa.me/591XXXXXXXX" target="_blank">Comprar</a>
    </div>
  </div>

  <!-- BOTON FLOTANTE -->
  <a class="whatsapp" href="https://wa.me/591XXXXXXXX" target="_blank">
    <i class="fab fa-whatsapp"></i>
  </a>

</body>
</html>
